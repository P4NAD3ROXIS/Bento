<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>🦊 Hello there!</title>
    <link rel=" shortcut icon" type="image/png" href="icons/favicon.png" />

    <link rel="stylesheet" href="css/style.css" />

    <script src="https://unpkg.com/feather-icons"></script>
  </head>

  <body class="">
    <button id="themeButton">
      <i id="themeButton__icon" data-feather="moon"></i>
    </button>
    <div class="container">
      <!-- Clock and Greetings  -->

      <div class="timeBlock">
        <div class="clock">
          <div id="hour" class=""></div>
          <div id="separator" class=""></div>
          <div id="minutes" class=""></div>
        </div>
        <div id="greetings" class=""></div>
      </div>

      <!-- Date and Weather  -->

      <div class="weatherBlock">
        <div class="weatherBlock__date">
          <div id="month" class=""></div>
          <div id="day" class=""></div>
        </div>
        <div class="weatherBlock__weather">
          <div class="weather-icon">
            <img src="icons/White/unknown.png" />
          </div>
          <div class="temperature-value">
            <p class="">- °<span class="g">c</span></p>
          </div>
          <div class="temperature-description">
            <p class=""></p>
          </div>
        </div>
      </div>

      <!-- Buttons Links  -->

      <div class="buttonLink">
          <a
          href="https://github.com/"
          class="buttonLink__link card buttonLink__link-1"
        >
          <i class="buttonLink__icon" data-feather="github"></i>
        </a>
        <a
          href="https://mail.google.com/mail/u/0/#inbox"
           class="buttonLink__link card buttonLink__link-2"
        >
          <i class="buttonLink__icon" data-feather="mail"></i>
        </a>
        <a
          href="https://www.twitch.tv/"
          class="buttonLink__link card buttonLink__link-3"
        >
          <i class="buttonLink__icon" data-feather="twitch"></i>
        </a>
        <a
          href="https://classroom.google.com/u/1/h"
          class="buttonLink__link card buttonLink__link-4"
        >
          <i class="buttonLink__icon" data-feather="briefcase"></i>
        </a>
        <a
          href="https://twitter.com/home?lang=es"
          class="buttonLink__link card buttonLink__link-5"
        >
          <i class="buttonLink__icon" data-feather="twitter"></i>
        </a>
        <a
          href="https://www.youtube.com/"
          class="buttonLink__link card buttonLink__link-6"
        >
          <i class="buttonLink__icon" data-feather="youtube"></i>
        </a>
      </div>

      <!-- Lists  -->

      <div class="card list list__1">
        <i class="list__head" data-feather="heart"></i>
        <a
          href="https://www.youtube.com/watch?v=XibsLTuRM20"
          class="list__link"
          >Eylia</a
        >
        <a
          href="https://www.youtube.com/watch?v=jP6wYwahfqQ"
          class="list__link"
          >Peace</a
        >
        <a
          href="https://www.4chan.org/"
          class="list__link"
          >4chan</a
        >
        <a
          href="https://www.reddit.com/r/unixporn/"
          class="list__link"
          >r/Unixporn</a
        >
      </div>

      <div class="card list list__2">
        <i class="list__head" data-feather="facebook"></i>
        <a href="https://www.facebook.com/"  class="list__link"
          >Facebook</a
        >
        <a href="https://www.messenger.com" class="list__link"
          >Messenger</a
        >
        <a href="https://www.instagram.com/"  class="list__link"
          >Instagram</a
        >
        <a
          href="https://www.facebook.com/groups/xunix.welcome.to.the.heaven"
         target="self"
          class="list__link"
          >Xunix</a
        >
      </div>
    </div>

    <!-- Scrips  -->

    <script src="js/time.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/greeting.js"></script>
    <script src="js/weather.js"></script>
    <script>
      feather.replace();
    </script>
  </body>

  <!-- Coded and designed by Miguel R. Ávila: https://github.com/MiguelRAvila -->
</html>
